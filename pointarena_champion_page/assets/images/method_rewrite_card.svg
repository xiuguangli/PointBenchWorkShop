<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-labelledby="title desc">
  <title id="title">Query rewrite illustration</title>
  <desc id="desc">A vague original query is rewritten into a concrete visual target.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f0e6d6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1d2521" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="760" height="280" rx="26" fill="url(#paper)"/>
  <rect x="280" y="28" width="200" height="44" rx="22" fill="#e8edf6" stroke="#cad7eb"/>
  <text x="380" y="57" text-anchor="middle" fill="#315c9a" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="900">Gemini rewrite</text>
  <path d="M380 72v22" fill="none" stroke="#cad7eb" stroke-width="4" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="34" y="92" width="246" height="146" rx="22" fill="#fffdf7" stroke="#d9cbb7"/>
    <rect x="480" y="92" width="246" height="146" rx="22" fill="#fffdf7" stroke="#d9cbb7"/>
  </g>
  <text x="60" y="126" fill="#64706b" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800">Original query</text>
  <text x="60" y="164" fill="#1d2521" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800">Point to the number</text>
  <text x="60" y="196" fill="#1d2521" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800">to the right of the</text>
  <text x="60" y="228" fill="#1d2521" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800">current point.</text>
  <text x="506" y="126" fill="#315c9a" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800">Rewritten query</text>
  <text x="506" y="170" fill="#184b3b" font-family="Aptos, Segoe UI, sans-serif" font-size="23" font-weight="900">Point to the</text>
  <text x="506" y="202" fill="#184b3b" font-family="Aptos, Segoe UI, sans-serif" font-size="23" font-weight="900">number 5 on the</text>
  <text x="506" y="234" fill="#184b3b" font-family="Aptos, Segoe UI, sans-serif" font-size="23" font-weight="900">clock.</text>
  <path d="M322 165h88" fill="none" stroke="#315c9a" stroke-width="8" stroke-linecap="round"/>
  <path d="M386 139l34 26-34 26" fill="none" stroke="#315c9a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
